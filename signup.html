<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f6"/>
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131110"/>
<title>Create account — ItsMyResearch</title>
<meta property="og:image" content="https://www.itsmyresearch.com/og-card.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://www.itsmyresearch.com/og-card.png"/>
<link rel="stylesheet" href="shared.css"/>
<script>(function(){var t=localStorage.getItem('rewiseed_theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="hero">
  <span class="tool-icon" id="hero-icon"></span>
  <h1>Create your account</h1>
  <p class="lede">One account across the whole research suite. We'll send a confirmation email from <b>noreply@rewiseed.com</b> — you can sign in once it's confirmed.</p>
</div>
<main style="max-width:480px">
  <div class="card">
    <form id="form" novalidate>
      <label class="field-label" for="name">Name</label>
      <input id="name" autocomplete="name" maxlength="80" placeholder="Your full name"/>
      <label class="field-label" for="email" style="margin-top:12px">Email</label>
      <input id="email" type="email" autocomplete="email" required maxlength="254" placeholder="you@university.edu"/>
      <label class="field-label" for="password" style="margin-top:12px">Password</label>
      <span class="key-wrap">
        <input id="password" type="password" autocomplete="new-password" required minlength="8" maxlength="200" placeholder="At least 8 characters"/>
        <button type="button" class="icon-btn" id="eye" aria-label="Show or hide password"></button>
      </span>
      <div id="captcha" style="margin-top:16px"></div>
      <label style="display:flex;gap:9px;align-items:flex-start;margin-top:16px;font-size:13.5px;color:var(--ink-2);cursor:pointer">
        <input type="checkbox" id="accept-terms" style="width:auto;margin-top:3px"/>
        <span>I agree to the <a href="terms.html" target="_blank" rel="noopener">Terms of Service</a> and <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.</span>
      </label>
      <div class="row">
        <button type="submit" id="submit" style="width:100%;justify-content:center"></button>
      </div>
      <p class="hint" style="text-align:center;margin:14px 0 0">Already have an account? <a href="signin.html">Sign in</a></p>
    </form>
    <div id="done" hidden></div>
  </div>
</main>
<script src="shared.js"></script>
<script src="account.js"></script>
<script>
const { esc, icon, toast } = Rewiseed;
const { api, mountCaptcha } = RewiseedAccount;
Rewiseed.renderNav('signup.html');
document.getElementById('hero-icon').innerHTML = icon('logo', 26);
document.getElementById('submit').innerHTML = `${icon('play', 15)} Create account`;
document.getElementById('eye').innerHTML = icon('eye', 16);
document.getElementById('eye').onclick = () => {
  const p = document.getElementById('password');
  const show = p.type === 'password';
  p.type = show ? 'text' : 'password';
  document.getElementById('eye').innerHTML = icon(show ? 'eyeOff' : 'eye', 16);
};
const captcha = mountCaptcha('captcha');

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) return toast('Enter a valid email address.', 'error');
  if (password.length < 8) return toast('Password must be at least 8 characters.', 'error');
  if (!document.getElementById('accept-terms').checked) return toast('Please accept the Terms and Privacy Policy first.', 'error');
  const captchaToken = captcha.getToken();
  if (!captchaToken) return toast('Please complete the puzzle first.', 'error');
  const btn = document.getElementById('submit');
  btn.disabled = true;
  try {
    const r = await api('/api/auth/signup', { method: 'POST', body: {
      email, password, name: document.getElementById('name').value, captchaToken, acceptTerms: true,
    }});
    document.getElementById('form').hidden = true;
    const done = document.getElementById('done');
    done.hidden = false;
    done.innerHTML = `
      <div style="text-align:center;padding:10px 0">
        <span class="tool-icon" style="width:48px;height:48px">${icon('check', 24)}</span>
        <h2 style="margin:12px 0 6px">Check your inbox</h2>
        <p class="hint">${esc(r.message)}</p>
        ${r.devConfirmLink ? `<div class="result" style="border:0;background:var(--warn-soft);border-radius:var(--radius-sm);padding:12px 14px;text-align:left"><b style="font-size:13px">Developer mode</b><p class="hint" style="margin:4px 0 8px">${esc(r.devNote)}</p><a class="link" href="${esc(r.devConfirmLink)}">Confirm this account ${icon('arrow', 13)}</a></div>` : ''}
      </div>`;
  } catch (err) {
    toast(err.message, 'error', 5000);
    captcha.reset();
  } finally { btn.disabled = false; }
});
</script>
</body>
</html>
