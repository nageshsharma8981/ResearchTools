<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23a16207%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22%3E%3Cpath d=%22M12 7v14M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z%22/%3E%3C/svg%3E"/>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f6"/>
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131110"/>
<title>Sign in — ItsMyResearch</title>
<link rel="stylesheet" href="shared.css"/>
<script>(function(){var t=localStorage.getItem('rewiseed_theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="hero">
  <span class="tool-icon" id="hero-icon"></span>
  <h1>Sign in</h1>
  <p class="lede">Welcome back to ItsMyResearch.</p>
</div>
<main style="max-width:480px">
  <div id="banner"></div>
  <div class="card">
    <form id="form" novalidate>
      <label class="field-label" for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required maxlength="254" placeholder="you@university.edu"/>
      <label class="field-label" for="password" style="margin-top:12px">Password</label>
      <span class="key-wrap">
        <input id="password" type="password" autocomplete="current-password" required maxlength="200" placeholder="Your password"/>
        <button type="button" class="icon-btn" id="eye" aria-label="Show or hide password"></button>
      </span>
      <div id="captcha" style="margin-top:16px"></div>
      <div class="row">
        <button type="submit" id="submit" style="width:100%;justify-content:center"></button>
      </div>
      <p class="hint" style="text-align:center;margin:14px 0 0">New here? <a href="signup.html">Create an account</a> · <a href="forgot.html">Forgot password?</a></p>
    </form>
  </div>
</main>
<script src="shared.js"></script>
<script>
const params = new URLSearchParams(location.search);
</script>
<script src="account.js"></script>
<script>
const { esc, icon, toast } = Rewiseed;
const { api, mountCaptcha } = RewiseedAccount;
Rewiseed.renderNav('signin.html');
document.getElementById('hero-icon').innerHTML = icon('logo', 26);
document.getElementById('submit').innerHTML = `${icon('play', 15)} Sign in`;
document.getElementById('eye').innerHTML = icon('eye', 16);
document.getElementById('eye').onclick = () => {
  const p = document.getElementById('password');
  const show = p.type === 'password';
  p.type = show ? 'text' : 'password';
  document.getElementById('eye').innerHTML = icon(show ? 'eyeOff' : 'eye', 16);
};
if (params.get('confirmed') === '1') {
  document.getElementById('banner').innerHTML = `<div class="card" style="padding:14px 20px"><span class="badge ok">${icon('check', 12)} Email confirmed</span> <span class="hint" style="display:inline;margin:0">— you can sign in now.</span></div>`;
} else if (params.get('confirmed') === 'expired') {
  document.getElementById('banner').innerHTML = `<div class="card" style="padding:14px 20px"><div class="error-box">${icon('alert', 16)}<span>That confirmation link is invalid or expired. Sign up again to get a fresh one.</span></div></div>`;
}
const captcha = mountCaptcha('captcha');

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const captchaToken = captcha.getToken();
  if (!captchaToken) return toast('Please complete the puzzle first.', 'error');
  const btn = document.getElementById('submit');
  btn.disabled = true;
  try {
    await api('/api/auth/signin', { method: 'POST', body: {
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      captchaToken,
    }});
    location.href = 'index.html';
  } catch (err) {
    toast(err.message, 'error', 5000);
    // unconfirmed account → offer a one-click fresh confirmation email
    if (/confirm your email/i.test(err.message) && !document.getElementById('resend-row')) {
      document.getElementById('form').insertAdjacentHTML('afterend',
        `<p id="resend-row" style="text-align:center;margin-top:12px;font-size:13.5px">Didn't get the email? <a href="#" class="link" id="resend-link">Send a fresh confirmation email</a></p>`);
      document.getElementById('resend-link').onclick = async (ev) => {
        ev.preventDefault();
        const em = document.getElementById('email').value.trim();
        if (!em) return toast('Enter your email above first', 'error');
        ev.target.textContent = 'Sending…';
        try {
          const r = await api('/api/auth/resend-confirm', { method: 'POST', body: { email: em } });
          toast(r.message, 'ok', 6000);
          ev.target.textContent = 'Sent — check your inbox and spam';
        } catch (e2) { toast(e2.message, 'error'); ev.target.textContent = 'Send a fresh confirmation email'; }
      };
    }
    captcha.reset();
    btn.disabled = false;
  }
});
</script>
</body>
</html>
