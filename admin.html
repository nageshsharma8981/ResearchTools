<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f6"/>
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131110"/>
<title>Admin console — ItsMyResearch</title>
<meta property="og:image" content="https://www.itsmyresearch.com/og-card.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://www.itsmyresearch.com/og-card.png"/>
<link rel="stylesheet" href="shared.css"/>
<script>(function(){var t=localStorage.getItem('rewiseed_theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
.users-wrap { overflow-x: auto; }
.users { border-collapse: collapse; width: 100%; font-size: 13.5px; }
.users th, .users td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
.users th { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
.users .u-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; vertical-align: middle; margin-right: 8px; background: var(--accent-soft); }
.users select { padding: 5px 8px; font-size: 12.5px; }
.users button { min-height: 32px; padding: 4px 12px; font-size: 12.5px; }
</style>
</head>
<body>
<div class="hero">
  <span class="tool-icon" id="hero-icon"></span>
  <h1>Admin console</h1>
  <p class="lede" id="scope-line">Manage user accounts.</p>
</div>
<main style="max-width:1000px">
  <div id="analytics"></div>
  <div id="access"></div>
  <div id="out"><div class="card"><div class="stream-status"><span class="spinner"></span>Loading…</div></div></div>
</main>
<script src="shared.js"></script>
<script src="account.js"></script>
<script>
const { esc, icon, toast } = Rewiseed;
const { api } = RewiseedAccount;
Rewiseed.renderNav('admin.html');
document.getElementById('hero-icon').innerHTML = icon('shield', 26);

let me = null;

const TOOL_LABELS = {
  'smart-literature-finder': 'Literature Finder', 'doi-finder': 'DOI Finder',
  'originality-checker': 'Originality Checker', 'research-gap-identifier': 'Gap Identifier',
  'research-question-generator': 'Question Generator', 'instrument-designer': 'Survey & Interview',
  'qualitative-coding-assistant': 'Qualitative Coding', 'ai-peer-review': 'AI Peer Review',
  'citation-formatter': 'Citation Formatter', 'apa-formatter': 'Reference Style Generator',
  'stats-advisor': 'Stats Advisor', 'literature-matrix': 'Synthesis Matrix',
  'writing-polisher': 'Writing Polisher', 'citation-graph': 'Citation Graph',
  'data-explorer': 'Data Explorer', 'data-sources': 'Data Sources',
  'scholar-profiles': 'Scholar Profiles', 'statpls': 'StatPLS',
  'rubric-lens': 'RubricLens', 'abstract-generator': 'Abstract & Summary Studio', 'paper-generator': 'Research Paper Generator',
  'bibliometrics': 'Bibliometric Analysis', 'journal-metrics': 'Journal Metrics & Finder',
  'journal-rankings': 'Journal Rankings & Comparison', 'citation-integrity': 'Citation Integrity Checker',
};
// mirrors the server's STUDENT_TOOLS default (kept in sync with server.js)
const STUDENT_DEFAULT = new Set(['smart-literature-finder','doi-finder','citation-formatter','apa-formatter','writing-polisher','originality-checker','citation-integrity','rubric-lens','research-question-generator','stats-advisor']);
const ROLE_BLURB = { student: 'Student — a curated essentials set (finding, citing, writing, checking).', educator: 'Educator / Researcher — full access to every tool.', admin: 'Admin — full access, and can manage users.', superadmin: 'Super admin — full platform control.' };
const USAGE_LABELS = { ...TOOL_LABELS, assistant: 'Assistant (chatbot)', library: 'Reference Library' };

async function loadAnalytics() {
  try {
    const a = await api('/api/admin/analytics');
    const u = a.users;
    document.getElementById('analytics').innerHTML = `
      <div class="card">
        <span class="overline">Analytics · last ${a.windowDays} days</span>
        <h2>Usage</h2>
        <div class="metric-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin:10px 0 16px">
          <div style="background:var(--surface-2);border-radius:var(--radius);padding:12px 14px"><b style="font-family:var(--font-serif);font-size:22px;display:block">${a.totals.runs.toLocaleString()}</b><span class="hint" style="margin:0">tool runs</span></div>
          <div style="background:var(--surface-2);border-radius:var(--radius);padding:12px 14px"><b style="font-family:var(--font-serif);font-size:22px;display:block">~${a.totals.estTokens.toLocaleString()}</b><span class="hint" style="margin:0">est. AI tokens</span></div>
          ${u.total !== undefined ? `<div style="background:var(--surface-2);border-radius:var(--radius);padding:12px 14px"><b style="font-family:var(--font-serif);font-size:22px;display:block">${u.total.toLocaleString()}</b><span class="hint" style="margin:0">accounts</span></div>` : ''}
          ${u.activeLast7d !== undefined ? `<div style="background:var(--surface-2);border-radius:var(--radius);padding:12px 14px"><b style="font-family:var(--font-serif);font-size:22px;display:block">${u.activeLast7d.toLocaleString()}</b><span class="hint" style="margin:0">active this week</span></div>` : ''}
          ${u.newLast30d !== undefined ? `<div style="background:var(--surface-2);border-radius:var(--radius);padding:12px 14px"><b style="font-family:var(--font-serif);font-size:22px;display:block">${u.newLast30d.toLocaleString()}</b><span class="hint" style="margin:0">new signups</span></div>` : ''}
          ${a.totals.anonRuns !== null && a.totals.anonRuns !== undefined ? `<div style="background:var(--surface-2);border-radius:var(--radius);padding:12px 14px"><b style="font-family:var(--font-serif);font-size:22px;display:block">${a.totals.anonRuns.toLocaleString()}</b><span class="hint" style="margin:0">anonymous runs</span></div>` : ''}
        </div>
        ${a.byTool.length ? `<div class="users-wrap"><table class="users"><thead><tr><th>Tool</th><th>Runs</th><th>Est. tokens</th><th>Signed-in users</th></tr></thead><tbody>
          ${a.byTool.map(t => `<tr><td><b>${esc(USAGE_LABELS[t.tool] || t.tool)}</b></td><td>${t.runs.toLocaleString()}</td><td>~${t.estTokens.toLocaleString()}</td><td>${t.users || 0}</td></tr>`).join('')}
        </tbody></table></div>` : `<p class="hint" style="margin:0">No usage recorded yet — metrics appear as tools get used.</p>`}
        <p class="hint" style="margin:10px 0 0">${esc(a.note)}</p>
      </div>`;
  } catch (e) { document.getElementById('analytics').innerHTML = ''; }
}

async function loadAccess() {
  if (me.role !== 'superadmin') return;
  const box = document.getElementById('access');
  try {
    const r = await api('/api/admin/access');
    box.innerHTML = `
    <div class="card">
      <span class="overline">Access control</span>
      <h2 style="font-size:17px">Who can create an account</h2>
      <p class="hint" style="margin:0 0 10px">Accounts are limited to <b>educational emails</b> (${esc(r.policy.academic)}), <b>${esc(r.policy.adminDomain)}</b> admins, and the addresses below. Everyone else — including Gmail and other personal mail — is refused at sign-up and sign-in. Add a specific email (<code>name@org.com</code>) or a whole domain (<code>org.com</code>) to grant access.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
        <input id="al-value" placeholder="email@org.com or org.com" style="max-width:260px"/>
        <input id="al-note" placeholder="note (optional) — who/why" style="max-width:220px"/>
        <button id="al-add">${icon('check', 15)} Allow</button>
      </div>
      ${r.allow.length ? `<div class="tbl-wrap"><table class="users"><thead><tr><th>Allowed</th><th>Type</th><th>Note</th><th>Added by</th><th></th></tr></thead><tbody>
        ${r.allow.map(a => `<tr><td><b>${esc(a.value)}</b></td><td><span class="badge">${esc(a.kind)}</span></td><td>${esc(a.note || '—')}</td><td class="hint">${esc(a.added_by || '')}</td><td><button class="ghost" style="min-height:26px;padding:2px 10px;font-size:11.5px" data-al-rm="${esc(a.value)}">Remove</button></td></tr>`).join('')}
      </tbody></table></div>` : `<p class="hint" style="margin:0">No individual addresses allow-listed yet — only educational and ${esc(r.policy.adminDomain)} emails can register.</p>`}
    </div>`;
    document.getElementById('al-add').onclick = async () => {
      const value = document.getElementById('al-value').value.trim();
      const note = document.getElementById('al-note').value.trim();
      if (!value) { toast('Enter an email or domain', 'error'); return; }
      try { await api('/api/admin/access', { method: 'POST', body: { value, note } }); toast('Allowed'); loadAccess(); }
      catch (e) { toast(e.message, 'error'); }
    };
    box.querySelectorAll('[data-al-rm]').forEach(b => b.onclick = async () => {
      try { await api('/api/admin/access/' + encodeURIComponent(b.dataset.alRm), { method: 'DELETE' }); toast('Removed'); loadAccess(); }
      catch (e) { toast(e.message, 'error'); }
    });
  } catch { box.innerHTML = ''; }
}

async function load() {
  loadAnalytics();
  loadAccess();
  const r = await api('/api/admin/users');
  document.getElementById('scope-line').textContent = r.scope === 'all'
    ? 'Super admin — every account on the platform.'
    : `Managing students and educators of ${r.scope || 'your institution (set your School/University on your profile)'}.`;
  const su = me.role === 'superadmin';
  document.getElementById('out').innerHTML = `
  <div class="card">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <span class="badge gold">${r.users.length} user${r.users.length === 1 ? '' : 's'}</span>
      <input id="filter" placeholder="Filter by email, name, or institution…" style="max-width:320px"/>
    </div>
    <div id="bulkbar"></div>
    <div class="users-wrap"><table class="users"><thead><tr>
      <th><input type="checkbox" id="sel-all" style="width:auto" title="Select all shown"/></th><th>User</th><th>Institution</th><th>Role</th><th>Status</th><th>Actions</th>
    </tr></thead><tbody>
      ${r.users.map(u => `<tr data-row="${u.id}" data-text="${esc((u.email + ' ' + u.name + ' ' + u.org).toLowerCase())}">
        <td>${u.role !== 'superadmin' && u.id !== me.id ? `<input type="checkbox" class="u-sel" data-usel="${u.id}" style="width:auto"/>` : ''}</td>
        <td>${u.photo ? `<img class="u-avatar" src="${esc(u.photo)}" alt=""/>` : ''}<b>${esc(u.name || '—')}</b><br/><span class="hint" style="margin:0">${esc(u.email)}</span></td>
        <td>${esc(u.org || '—')}</td>
        <td>${u.role !== 'superadmin' && u.id !== me.id
            ? `<select data-role="${u.id}" title="${esc(ROLE_BLURB[u.role] || '')}"><option value="student" ${u.role === 'student' ? 'selected' : ''}>student</option><option value="educator" ${u.role === 'educator' ? 'selected' : ''}>educator</option>${su ? `<option value="admin" ${u.role === 'admin' ? 'selected' : ''}>admin</option>` : ''}</select>`
            : `<span class="badge ${u.role === 'superadmin' ? 'gold' : ''}">${esc(u.role)}</span>`}</td>
        <td>${u.disabled ? `<span class="badge warn">disabled</span>` : u.confirmed ? `<span class="badge ok">active</span>` : `<span class="badge">unconfirmed</span>`}</td>
        <td>${u.role !== 'superadmin' && u.id !== me.id
            ? `<button type="button" class="ghost" data-tools="${u.id}">Tools${u.tool_override && u.tool_override.length ? ` (${u.tool_override.length})` : ''}</button> <button type="button" class="${u.disabled ? '' : 'danger'}" data-toggle="${u.id}" data-disabled="${u.disabled ? 1 : 0}">${u.disabled ? 'Enable' : 'Disable'}</button>${
              su ? ` <button type="button" class="danger" data-del="${u.id}" data-email="${esc(u.email)}">Delete</button>` : ''}`
            : ''}</td>
      </tr>
      <tr data-toolrow="${u.id}" hidden><td colspan="6" style="background:var(--surface-2)">
        <div style="padding:6px 4px">
          <b style="font-size:13px">Tool access for ${esc(u.email)}</b>
          <p class="hint" style="margin:4px 0 8px">This account currently sees the ticked tools. Its <b>${esc(u.role)}</b> role default is applied automatically — tick extra tools to grant more, or untick to restrict. ${u.tool_override && u.tool_override.length ? '<b>Custom override active.</b>' : 'Following the role default.'}</p>
          <div class="row" style="margin:0 0 10px;gap:8px">
            <button type="button" class="ghost" data-toolpreset="${u.id}" data-preset="student" style="min-height:30px;padding:3px 12px;font-size:12px">Student set</button>
            <button type="button" class="ghost" data-toolpreset="${u.id}" data-preset="all" style="min-height:30px;padding:3px 12px;font-size:12px">All tools (educator)</button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px 14px">
            ${Object.entries(TOOL_LABELS).map(([id, label]) => `
              <label style="display:flex;gap:7px;align-items:center;font-size:13px;cursor:pointer">
                <input type="checkbox" style="width:auto" data-toolcb="${u.id}" value="${id}" ${(u.tool_access && u.tool_access.length) ? (u.tool_access.includes(id) ? 'checked' : '') : 'checked'}/> ${esc(label)}${STUDENT_DEFAULT.has(id) ? ' <span class="hint" style="margin:0">· student</span>' : ''}
              </label>`).join('')}
          </div>
          <div class="row" style="margin-top:12px">
            <button type="button" data-toolsave="${u.id}" style="min-height:36px;padding:6px 16px;font-size:13px">Save access</button>
          </div>
        </div>
      </td></tr>`).join('')}
    </tbody></table></div>
    ${r.users.length === 0 ? `<p class="hint" style="margin-top:12px">No users in scope yet.</p>` : ''}
  </div>`;

  // ----- bulk tool assignment -----
  const selectedIds = () => [...document.querySelectorAll('.u-sel:checked')].map(cb => cb.dataset.usel);
  function renderBulkBar() {
    const ids = selectedIds();
    const bar = document.getElementById('bulkbar');
    if (!ids.length) { bar.innerHTML = ''; return; }
    bar.innerHTML = `<div class="card" style="margin:0 0 12px;border-color:var(--accent);background:var(--accent-soft);padding:12px 14px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <b style="font-size:14px">${ids.length} user${ids.length === 1 ? '' : 's'} selected</b>
        <button type="button" id="bulk-open" style="min-height:34px;padding:5px 16px">${icon('gear', 15)} Assign tools to selected</button>
        <button type="button" class="ghost" id="bulk-clear" style="min-height:34px;padding:5px 12px">Clear selection</button>
      </div>
      <div id="bulk-picker" hidden style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
        <p class="hint" style="margin:0 0 8px">Tick the tools these ${ids.length} account${ids.length === 1 ? '' : 's'} should have. This replaces each one's current tool access.</p>
        <div class="row" style="margin:0 0 10px;gap:8px">
          <button type="button" class="ghost" id="bulk-preset-student" style="min-height:30px;padding:3px 12px;font-size:12px">Student set</button>
          <button type="button" class="ghost" id="bulk-preset-all" style="min-height:30px;padding:3px 12px;font-size:12px">All tools (educator)</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px 14px">
          ${Object.entries(TOOL_LABELS).map(([id, label]) => `<label style="display:flex;gap:7px;align-items:center;font-size:13px;cursor:pointer"><input type="checkbox" style="width:auto" data-bulkcb value="${id}" ${STUDENT_DEFAULT.has(id) ? 'checked' : ''}/> ${esc(label)}${STUDENT_DEFAULT.has(id) ? ' <span class="hint" style="margin:0">· student</span>' : ''}</label>`).join('')}
        </div>
        <div class="row" style="margin-top:12px"><button type="button" id="bulk-apply" style="min-height:36px;padding:6px 16px;font-size:13px">Apply to ${ids.length} user${ids.length === 1 ? '' : 's'}</button></div>
      </div>`;
    document.getElementById('bulk-clear').onclick = () => { document.querySelectorAll('.u-sel:checked, #sel-all').forEach(cb => { cb.checked = false; }); renderBulkBar(); };
    document.getElementById('bulk-open').onclick = () => { const p = document.getElementById('bulk-picker'); p.hidden = !p.hidden; };
    document.getElementById('bulk-preset-student').onclick = () => document.querySelectorAll('[data-bulkcb]').forEach(cb => { cb.checked = STUDENT_DEFAULT.has(cb.value); });
    document.getElementById('bulk-preset-all').onclick = () => document.querySelectorAll('[data-bulkcb]').forEach(cb => { cb.checked = true; });
    document.getElementById('bulk-apply').onclick = async (e) => {
      const toolAccess = [...document.querySelectorAll('[data-bulkcb]:checked')].map(cb => cb.value);
      const ids2 = selectedIds();
      if (!toolAccess.length) return toast('Select at least one tool', 'error');
      if (!ids2.length) return toast('No users selected', 'error');
      e.target.disabled = true;
      try {
        const r = await api('/api/admin/users/bulk-tools', { method: 'POST', body: { ids: ids2, toolAccess } });
        toast(`Tools assigned to ${r.updated} user${r.updated === 1 ? '' : 's'}${r.skipped ? ` (${r.skipped} skipped)` : ''}`);
        load();
      } catch (err) { toast(err.message, 'error', 5000); e.target.disabled = false; }
    };
  }
  document.querySelectorAll('.u-sel').forEach(cb => cb.onchange = renderBulkBar);
  const selAll = document.getElementById('sel-all');
  if (selAll) selAll.onchange = () => { document.querySelectorAll('[data-row]:not([hidden]) .u-sel').forEach(cb => { cb.checked = selAll.checked; }); renderBulkBar(); };

  document.getElementById('filter').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('[data-row]').forEach(tr => { tr.hidden = q && !tr.dataset.text.includes(q); });
  });
  document.querySelectorAll('[data-toggle]').forEach(b => b.onclick = async () => {
    b.disabled = true;
    try {
      await api(`/api/admin/users/${b.dataset.toggle}`, { method: 'PUT', body: { disabled: b.dataset.disabled !== '1' } });
      toast('Updated');
      load();
    } catch (e) { toast(e.message, 'error', 5000); b.disabled = false; }
  });
  document.querySelectorAll('[data-tools]').forEach(b => b.onclick = () => {
    const row = document.querySelector(`[data-toolrow="${b.dataset.tools}"]`);
    row.hidden = !row.hidden;
  });
  document.querySelectorAll('[data-toolpreset]').forEach(b => b.onclick = () => {
    const id = b.dataset.toolpreset, preset = b.dataset.preset;
    document.querySelectorAll(`[data-toolcb="${id}"]`).forEach(cb => {
      cb.checked = preset === 'all' ? true : STUDENT_DEFAULT.has(cb.value);
    });
  });
  document.querySelectorAll('[data-toolsave]').forEach(b => b.onclick = async () => {
    const id = b.dataset.toolsave;
    const checked = [...document.querySelectorAll(`[data-toolcb="${id}"]:checked`)].map(cb => cb.value);
    if (!checked.length) return toast('Select at least one tool — to block everything, disable the account instead.', 'error', 5000);
    b.disabled = true;
    try {
      await api(`/api/admin/users/${id}`, { method: 'PUT', body: { toolAccess: checked } });
      toast('Tool access saved');
      load();
    } catch (e) { toast(e.message, 'error', 5000); b.disabled = false; }
  });
  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    if (!confirm(`Permanently delete ${b.dataset.email}? This cannot be undone.`)) return;
    b.disabled = true;
    try {
      await api(`/api/admin/users/${b.dataset.del}`, { method: 'DELETE' });
      toast('Account deleted');
      load();
    } catch (e) { toast(e.message, 'error', 5000); b.disabled = false; }
  });
  document.querySelectorAll('[data-role]').forEach(s => s.onchange = async () => {
    try {
      await api(`/api/admin/users/${s.dataset.role}`, { method: 'PUT', body: { role: s.value } });
      toast('Role updated');
      load();
    } catch (e) { toast(e.message, 'error', 5000); load(); }
  });
}

api('/api/me').then(r => {
  me = r.user;
  if (!['admin', 'superadmin'].includes(me.role)) throw new Error('not admin');
  return load();
}).catch(() => {
  document.getElementById('out').innerHTML = `
    <div class="card" style="text-align:center">
      <p class="hint">This area is for administrators. Sign in with an admin account to continue.</p>
      <div class="row" style="justify-content:center"><a href="signin.html"><button type="button">Sign in</button></a></div>
    </div>`;
});
</script>
</body>
</html>
