<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Qualitative Coding Assistant — Offline</title>
<link rel="stylesheet" href="shared.css"/></head>
<body>
<header><h1>🧬 Qualitative Coding Assistant</h1><p>Braun &amp; Clarke thematic analysis over interview transcripts.</p></header>
<main>
  <div id="settings"></div>
  <div class="card">
    <h2>Paste interview transcript(s)</h2>
    <p class="hint">Multiple transcripts welcome — separate with <code>=== Interview 2 ===</code>.</p>
    <textarea id="in" placeholder="Paste full interview transcript(s)…"></textarea>
    <div class="row"><button id="run">Run thematic analysis</button><button id="dl" class="ghost" disabled>Download .md</button></div>
  </div>
  <div id="out"></div>
</main>
<script src="shared.js"></script>
<script>
Rewiseed.renderSettingsBar('settings');
const SYS = `You are a qualitative research assistant conducting a Braun & Clarke (2006) reflexive thematic analysis.
Steps to produce, in order, as Markdown:
1. **Familiarisation notes** — brief overall impressions.
2. **Open codes** — a table of code label, short definition, and 1-2 verbatim quotes (with speaker/turn if inferable). Ground every code in the data; do NOT invent quotes.
3. **Candidate themes** — cluster codes into 3-6 themes, each with a 2-3 sentence description and constituent codes.
4. **Thematic map narrative** — how themes relate; tensions or contradictions.
5. **Analyst reflexivity note** — one paragraph on interpretive choices.
Use only what is in the transcript. If information is missing, say so.`;
let last = '';
document.getElementById('run').onclick = async () => {
  const input = document.getElementById('in').value.trim();
  if (!input) return;
  const btn = document.getElementById('run'); btn.disabled = true;
  const out = document.getElementById('out');
  out.innerHTML = '<div class="card"><h2>Thematic analysis (Braun &amp; Clarke)</h2><div class="result" id="stream"><span class="spinner"></span>Coding…</div></div>';
  try {
    last = await Rewiseed.callLLM({ system: SYS, user: input, temperature: 0.2,
      onStream: (t) => { document.getElementById('stream').innerHTML = Rewiseed.md(t); } });
    document.getElementById('dl').disabled = false;
  } catch (e) { document.getElementById('stream').innerHTML = '<b style="color:#dc2626">'+e.message+'</b>'; }
  finally { btn.disabled = false; }
};
document.getElementById('dl').onclick = () => Rewiseed.downloadText('thematic-analysis.md', last);
</script>
</body></html>
