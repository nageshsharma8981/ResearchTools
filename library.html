<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f6"/>
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131110"/>
<title>My Library — ItsMyResearch</title>
<meta property="og:image" content="https://www.itsmyresearch.com/og-card.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://www.itsmyresearch.com/og-card.png"/>
<link rel="stylesheet" href="shared.css"/>
<script>(function(){var t=localStorage.getItem('rewiseed_theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
.lib-notes { width: 100%; min-height: 40px; font-family: var(--font-sans); font-size: 13px; margin-top: 8px; }
.lib-empty-hint a { font-weight: 600; }
</style>
</head>
<body>
<div class="hero">
  <span class="tool-icon" id="hero-icon"></span>
  <h1>My Library</h1>
  <p class="lede">Papers you've saved from across the suite — with your notes, ready to export as BibTeX or send into the analysis pipeline.</p>
</div>
<main style="max-width:860px">
  <div id="out"><div class="card"><div class="stream-status"><span class="spinner"></span>Loading…</div></div></div>
</main>
<script src="shared.js"></script>
<script src="account.js"></script>
<script src="discovery.js"></script>
<script>
const { esc, icon, toast } = Rewiseed;
const { api } = RewiseedAccount;
Rewiseed.renderNav('library.html');
document.getElementById('hero-icon').innerHTML = icon('library', 26);

let papers = [];

function bibtex(p) {
  const authors = p.authors || '';
  const key = (authors.split(',')[0] || 'ref').trim().split(' ').pop().toLowerCase().replace(/[^a-z]/g, '') + (p.year || '') + p.id;
  return `@article{${key},\n` + [
    `  title = {${p.title}}`,
    authors ? `  author = {${authors.split(', ').join(' and ')}}` : null,
    p.year ? `  year = {${p.year}}` : null,
    p.venue ? `  journal = {${p.venue}}` : null,
    p.doi ? `  doi = {${p.doi}}` : null,
    p.url && !p.doi ? `  url = {${p.url}}` : null,
  ].filter(Boolean).join(',\n') + '\n}';
}

function render() {
  const out = document.getElementById('out');
  if (!papers.length) {
    out.innerHTML = `
      <div class="card"><div class="empty-state-card">
        ${icon('library', 30)}
        <span class="es-title">Your library is empty</span>
        <p class="lib-empty-hint">Save papers with the ${esc('Save')} button on <a href="smart-literature-finder.html">Literature Finder</a> results and <a href="doi-finder.html">DOI lookups</a> — they'll collect here with your notes.</p>
      </div></div>`;
    return;
  }
  out.innerHTML = `
    <div class="card" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 20px">
      <span class="badge gold">${papers.length} paper${papers.length === 1 ? '' : 's'}</span>
      <input id="lib-filter" placeholder="Filter…" style="max-width:260px"/>
      <span class="push" style="margin-left:auto;display:flex;gap:10px;flex-wrap:wrap">
        <button class="ghost" id="lib-recommend">${icon('graph', 15)} More like my library</button>
        <button class="ghost" id="lib-bib">${icon('download', 15)} BibTeX (all)</button>
        <button id="lib-analyze">Analyze in pipeline ${icon('arrow', 15)}</button>
      </span>
    </div>
    <div id="lib-recs"></div>
    ${papers.map(p => `
    <article class="paper" data-lib="${p.id}" data-text="${esc((p.title + ' ' + p.authors + ' ' + p.venue + ' ' + p.notes).toLowerCase())}">
      <h3>${esc(p.title)}</h3>
      <div class="meta">${esc(p.authors) || 'Unknown authors'}${p.venue ? ' · ' + esc(p.venue) : ''}${p.year ? ' · ' + p.year : ''}</div>
      <textarea class="lib-notes" data-notes="${p.id}" maxlength="1000" placeholder="Your notes on this paper…">${esc(p.notes)}</textarea>
      <div class="paper-foot">
        <span class="links">
          ${p.doi ? `<a class="link" href="https://doi.org/${esc(p.doi)}" target="_blank" rel="noreferrer">DOI ${icon('external', 12)}</a>` : ''}
          ${p.url ? `<a class="link" href="${esc(p.url)}" target="_blank" rel="noreferrer">Link ${icon('external', 12)}</a>` : ''}
          <button class="ghost" style="min-height:32px;padding:4px 12px;font-size:12.5px" data-save-notes="${p.id}">Save notes</button>
          <button class="danger" style="min-height:32px;padding:4px 12px;font-size:12.5px" data-remove="${p.id}">Remove</button>
        </span>
      </div>
    </article>`).join('')}`;

  document.getElementById('lib-filter').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('[data-lib]').forEach(el => { el.hidden = q && !el.dataset.text.includes(q); });
  });
  document.getElementById('lib-recommend').onclick = (e) => recommend(e.currentTarget);
  document.getElementById('lib-bib').onclick = () => Rewiseed.downloadText('library.bib', papers.map(bibtex).join('\n\n'));
  document.getElementById('lib-analyze').onclick = () => {
    const text = 'My saved library (from ReWiseEd):\n\n' + papers.map((p, i) =>
      `${i + 1}. ${p.authors || 'Unknown'} (${p.year || 'n.d.'}). "${p.title}". ${p.venue || ''}${p.notes ? ' — My notes: ' + p.notes : ''}`).join('\n\n');
    localStorage.setItem('rewiseed_draft_matrix', text);
    toast('Sent — opening Synthesis Matrix');
    location.href = 'literature-matrix.html';
  };
  document.querySelectorAll('[data-save-notes]').forEach(b => b.onclick = async () => {
    b.disabled = true;
    try {
      await api(`/api/library/${b.dataset.saveNotes}`, { method: 'PUT', body: { notes: document.querySelector(`[data-notes="${b.dataset.saveNotes}"]`).value } });
      toast('Notes saved');
    } catch (e) { toast(e.message, 'error'); }
    b.disabled = false;
  });
  document.querySelectorAll('[data-remove]').forEach(b => b.onclick = async () => {
    if (!confirm('Remove this paper from your library?')) return;
    try {
      await api(`/api/library/${b.dataset.remove}`, { method: 'DELETE' });
      papers = papers.filter(p => p.id !== Number(b.dataset.remove));
      toast('Removed');
      render();
    } catch (e) { toast(e.message, 'error'); }
  });
}

async function recommend(btn) {
  const recs = document.getElementById('lib-recs');
  const withDoi = papers.filter(p => p.doi).slice(0, 8);
  if (!withDoi.length) {
    recs.innerHTML = `<p class="hint" style="margin:10px 0 0">Recommendations use the topics of your saved papers, which need a DOI. Save some papers from the Literature or DOI Finder first.</p>`;
    return;
  }
  btn.disabled = true;
  recs.innerHTML = `<div class="stream-status" style="margin-top:12px"><span class="spinner"></span>Reading your library's topics…</div>`;
  try {
    // gather topic ids across saved papers (sample up to 6 to stay light)
    const topicCounts = new Map();
    for (const p of withDoi.slice(0, 6)) {
      try {
        const { topics } = await RewiseedDiscovery.relatedFor(p.doi);
        for (const t of topics) topicCounts.set(t.id, { id: t.id, name: t.display_name, n: (topicCounts.get(t.id)?.n || 0) + 1 });
      } catch { /* skip a paper that won't resolve */ }
    }
    const top = [...topicCounts.values()].sort((a, b) => b.n - a.n).slice(0, 4);
    if (!top.length) { recs.innerHTML = `<p class="hint" style="margin:10px 0 0">Couldn't derive topics from your saved papers — their DOIs may not be indexed in OpenAlex.</p>`; return; }
    const exclude = [...papers.map(p => p.doi).filter(Boolean), ...papers.map(p => p.url).filter(Boolean)];
    const works = await RewiseedDiscovery.byTopics(top.map(t => t.id), exclude, 10);
    recs.innerHTML = `
      <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
        <span class="overline">More like my library</span>
        <p class="hint" style="margin:4px 0 10px">Based on your library's top topics: ${top.map(t => `<span class="badge">${esc(t.name)}</span>`).join(' ')}</p>
        ${works.length ? works.map(w => RewiseedDiscovery.paperCard(w)).join('') : '<p class="hint" style="margin:0">No new papers found beyond what you already have.</p>'}
        <p class="hint" style="margin:8px 0 0">Topic-based suggestions from OpenAlex, ranked by citations — a discovery aid, not a systematic search.${works.some(w => w.open_access && !w.open_access.is_oa) ? ' ' + RewiseedDiscovery.PAYWALL_NOTE : ''}</p>
      </div>`;
    RewiseedDiscovery.wireSaveButtons(recs);
  } catch (e) {
    recs.innerHTML = `<div class="error-box" style="margin-top:12px">${icon('alert', 16)}<span>${esc(e.message)}</span></div>`;
  } finally { btn.disabled = false; }
}

api('/api/library').then(r => { papers = r.papers; render(); }).catch(() => {
  document.getElementById('out').innerHTML = `
    <div class="card" style="text-align:center">
      <p class="hint">Sign in to build a personal library of saved papers with notes and BibTeX export.</p>
      <div class="row" style="justify-content:center"><a href="signin.html"><button type="button">Sign in</button></a><a href="signup.html"><button type="button" class="ghost">Create account</button></a></div>
    </div>`;
});
</script>
</body>
</html>
